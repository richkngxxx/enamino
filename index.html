<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="src/assets/images/logo.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="google-site-verification" content="dgk9mRFusopg0f01ZMjhhZAi_dznBlSVs3rO745BLXQ" />

  <!-- Primary Meta Tags -->
  <meta name="keywords"
    content="Enamino, éco-village, Gabon, Parc National de Loango, safari, écotourisme, hébergement, bungalows, Afrique, faune sauvage, éléphants, gorilles" />
  <meta name="author" content="L'Eco-Village d'Enamino" />
  <meta name="robots" content="index, follow" />

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:image" content="https://enamino.fr/images/logo-complete.png" />

  <!-- Hreflang -->
  <link rel="alternate" hreflang="fr" href="https://enamino.fr/" />
  <link rel="alternate" hreflang="en" href="https://enamino.fr/" />
  <link rel="alternate" hreflang="es" href="https://enamino.fr/" />
  <link rel="alternate" hreflang="x-default" href="https://enamino.fr/" />

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image" />
  <meta property="twitter:image" content="https://enamino.fr/images/logo-complete.png" />

  <!-- Theme Color -->
  <meta name="theme-color" content="#352a24" />

  <!-- PWA Manifest -->
  <link rel="manifest" href="/manifest.json" />

  <!-- Apple Touch Icon -->
  <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-192x192.png" />
  <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152x152.png" />
  <link rel="apple-touch-icon" sizes="144x144" href="/icons/icon-144x144.png" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Enamino" />

  <!-- Preload critical assets -->
  <link rel="preload" href="/src/assets/images/logo.webp" as="image" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Kaushan+Script&family=Raleway:ital,wght@0,100..900;1,100..900&display=swap"
    rel="stylesheet">
</head>

<body>
  <div id="root">
    <!-- Loading screen - shows while React loads -->
    <div id="loading" style="
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #352a24 0%, #1a1410 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    ">
      <div style="
        width: 80px;
        height: 80px;
        border: 4px solid rgba(173, 193, 120, 0.3);
        border-radius: 50%;
        border-top-color: #adc178;
        animation: spin 1s ease-in-out infinite;
      "></div>
      <p style="
        margin-top: 20px;
        color: #f0ead2;
        font-family: 'Raleway', sans-serif;
        font-size: 16px;
      ">Loading Enamino...</p>
    </div>
  </div>
  <script type="module" src="/src/main.jsx"></script>
  <script>
    // Unregister old service workers and register new one
    if ('serviceWorker' in navigator) {
      // First, unregister any existing service workers
      navigator.serviceWorker.getRegistrations().then(function (registrations) {
        for (let registration of registrations) {
          registration.unregister();
        }
        // Then register the new service worker
        navigator.serviceWorker.register('/sw.js')
          .then((registration) => {
            console.log('SW registered:', registration);
          })
          .catch((error) => {
            console.log('SW registration failed:', error);
          });
      });
    }
  </script>
  <style>
    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</body>

</html>
